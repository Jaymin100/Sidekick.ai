<!DOCTYPE html>
<html>
<head>
  <title>Sidekick.ai</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h2>sidekick.ai</h2>

    <!-- MIC SECTION -->
    <div class="mic-container">

      <!-- Start -->
      <button id="startBtn" class="primary-btn">Start Speaking</button>

      <!-- Listening controls -->
      <div id="listeningControls" style="display:none;">
        <button id="sendBtn" class="primary-btn">Send</button>
      </div>

      <!-- Cancel (global button) -->
      <button id="cancelBtn" class="secondary-btn" style="display:none;">
        Cancel
      </button>

      <p id="status" class="instruction">
        Click the button to start
      </p>

    </div>

    <!-- ONBOARDING -->
    <div id="onboarding" style="display:none;">
      <h3 id="taskTitle"></h3>
      <p id="stepInfo"></p>
      <button id="nextBtn" class="primary-btn">Next</button>
      <button id="cancelBtnOnboarding" class="secondary-btn">Cancel</button>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
