<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidekick</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1 class="title">Sidekick</h1>
      <p class="muted">Extension UI goes here.</p>
      <button type="button" id="ping" class="btn">Ping background</button>
      <button type="button" id="copy-dom" class="btn btn-secondary">
        Copy full page HTML (DOM)
      </button>
      <button type="button" id="audio-download" class="btn btn-secondary">
        Play audio (API)
      </button>
      <audio id="audio-player" controls preload="none"></audio>
      <div class="spotlight-block">
        <label class="label" for="spotlight-sel">Spotlight test (CSS selector)</label>
        <input
          id="spotlight-sel"
          class="input"
          type="text"
          value="a"
          placeholder="e.g. a, #id, button"
          spellcheck="false"
        />
        <div class="row">
          <button type="button" id="spotlight-run" class="btn btn-small">Spotlight</button>
          <button type="button" id="spotlight-clear" class="btn btn-small btn-ghost">Clear</button>
        </div>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
